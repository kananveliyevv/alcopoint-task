<!doctype html>
<html lang="az" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alcopoint-Task</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="apple-touch-icon" href="logo.png" />

  <!-- Fonts: Playfair Display (display) + Quicksand (body) + JetBrains Mono (code) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Quicksand:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Tailwind (config injected via inline script first) -->
  <script>
    // Tailwind font + colour tokens — must run before CDN script
    window.__NTX_TAILWIND_CONFIG__ = {
      theme: {
        extend: {
          fontFamily: {
            sans:    ['Quicksand', 'system-ui', 'sans-serif'],
            display: ['Playfair Display', 'Georgia', 'serif'],
            mono:    ['JetBrains Mono', 'monospace'],
          },
          colors: {
            base:       'rgb(var(--c-base) / <alpha-value>)',
            surface:    'rgb(var(--c-surface) / <alpha-value>)',
            elev:       'rgb(var(--c-elev) / <alpha-value>)',
            sunken:     'rgb(var(--c-sunken) / <alpha-value>)',
            edge:       'rgb(var(--c-edge) / <alpha-value>)',
            edgeSubtle: 'rgb(var(--c-edge-subtle) / <alpha-value>)',
            ctext:      'rgb(var(--c-text) / <alpha-value>)',
            ctext2:     'rgb(var(--c-text-2) / <alpha-value>)',
            ctext3:     'rgb(var(--c-text-3) / <alpha-value>)',
            accent:     'rgb(var(--c-accent) / <alpha-value>)',
            accentH:    'rgb(var(--c-accent-h) / <alpha-value>)',
            accentS:    'rgb(var(--c-accent-soft) / <alpha-value>)',
          }
        }
      }
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = window.__NTX_TAILWIND_CONFIG__;</script>

  <!-- App styles -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <div id="root"></div>

  <!-- CDN import map -->
  <script type="importmap">
    {
      "imports": {
        "react":              "https://esm.sh/react@18.3.1",
        "react-dom/client":   "https://esm.sh/react-dom@18.3.1/client",
        "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.45.4",
        "lucide-react":       "https://esm.sh/lucide-react@0.453.0?deps=react@18.3.1"
      }
    }
  </script>

  <!-- Entry point -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
